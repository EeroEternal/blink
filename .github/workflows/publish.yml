name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BOXLITE_DEPS_STUB: "2"
  BOXLITE_RUNTIME_URL: https://github.com/boxlite-ai/boxlite/releases/download/v0.9.5/boxlite-runtime-v0.9.5-linux-x64-gnu.tar.gz

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler \
            libssl-dev \
            pkg-config

      - name: Publish blinkvm-shared
        run: cargo publish -p blinkvm-shared
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish blinkvm-sdk
        run: cargo publish -p blinkvm-sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
