name: Release blink-server

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release tag / image tag (for example v0.3.0)
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/eeroeternal/blink-server
  BOXLITE_RUNTIME_URL: https://github.com/boxlite-ai/boxlite/releases/download/v0.9.5/boxlite-runtime-v0.9.5-linux-x64-gnu.tar.gz

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            BOXLITE_RUNTIME_URL=${{ env.BOXLITE_RUNTIME_URL }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

  release-binary:
    needs: build-image
    runs-on: ubuntu-latest
    container: debian:bookworm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            protobuf-compiler \
            libssl-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build blink-server release binary
        env:
          BOXLITE_DEPS_STUB: "2"
          BOXLITE_RUNTIME_URL: ${{ env.BOXLITE_RUNTIME_URL }}
        run: cargo build --release --locked -p blink-server

      - name: Write checksum
        run: sha256sum target/release/blink-server > target/release/blink-server.sha256

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          files: |
            target/release/blink-server
            target/release/blink-server.sha256
